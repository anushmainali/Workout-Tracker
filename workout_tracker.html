<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="75 Hard">
<title>75 Hard Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --txt:#f0f0f0;--txt2:#a0a0a0;--txt3:#666;
  --blue:#378ADD;--blue-bg:#0c2340;--blue-lt:#85B7EB;
  --green:#1D9E75;--green-bg:#042c1e;--green-lt:#5DCAA5;
  --amber:#EF9F27;--amber-bg:#2a1e00;
  --red:#E24B4A;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:40px}
.header{background:var(--bg2);padding:16px;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600;color:var(--txt)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:600;color:var(--txt)}
.stat-lbl{font-size:10px;color:var(--txt2);margin-top:2px}
.section{padding:14px}
.section-title{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.day-nav{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.day-nav-label{flex:1;font-size:16px;font-weight:600}
.day-nav button{background:var(--bg3);border:none;color:var(--txt);width:34px;height:34px;border-radius:var(--radius-sm);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-push{background:var(--blue-bg);color:var(--blue-lt)}
.badge-pull{background:var(--green-bg);color:var(--green-lt)}
.phase-box{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--txt2);margin-bottom:12px;border-left:3px solid var(--amber)}
.ex-card{background:var(--bg2);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ex-row{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid #2a2a2a;gap:8px}
.ex-row:last-child{border-bottom:none}
.ex-name{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.ex-meta{font-size:11px;color:var(--txt2)}
.ex-sets{font-size:11px;color:var(--txt3);text-align:right;min-width:60px}
.weight-input{width:60px;background:var(--bg3);border:1px solid #444;border-radius:var(--radius-sm);color:var(--txt);font-size:13px;padding:5px 6px;text-align:center;-moz-appearance:textfield}
.weight-input::-webkit-outer-spin-button,.weight-input::-webkit-inner-spin-button{-webkit-appearance:none}
.check-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1.5px solid #444;background:transparent;color:var(--txt2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.run-card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.run-field{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.run-field-label{font-size:13px;color:var(--txt2)}
.run-field-right{display:flex;align-items:center;gap:6px}
.run-input{width:72px;background:var(--bg3);border:1px solid #444;border-radius:var(--radius-sm);color:var(--txt);font-size:14px;padding:6px 8px;text-align:center;-moz-appearance:textfield}
.run-input::-webkit-outer-spin-button,.run-input::-webkit-inner-spin-button{-webkit-appearance:none}
.run-unit{font-size:12px;color:var(--txt3)}
.run-target-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm)}
.pace-display{font-size:13px;color:var(--amber);font-weight:500}
.mark-run-btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--txt2)}
.mark-run-btn.done{background:var(--green);color:#fff}
.day-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:3px;margin-bottom:10px}
.dot{height:20px;border-radius:3px;background:var(--bg3);border:1px solid #2a2a2a;cursor:pointer}
.dot.push-done{background:#185FA5;border-color:var(--blue)}
.dot.pull-done{background:#0F6E56;border-color:var(--green)}
.dot.active{border:2px solid var(--txt)}
.prog-item{margin-bottom:12px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-name{font-size:12px;color:var(--txt2)}
.prog-val{font-size:12px;color:var(--txt3)}
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--blue)}
.prog-fill-run{background:var(--green)}
.run-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.run-stat{background:var(--bg3);border-radius:var(--radius-sm);padding:8px;text-align:center}
.run-stat-val{font-size:16px;font-weight:600;color:var(--txt)}
.run-stat-lbl{font-size:10px;color:var(--txt2);margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>75 Hard — Anush</h1>
    <span id="header-badge" class="badge badge-push">Push</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-val" id="s-day">1</div><div class="stat-lbl">Today</div></div>
  <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Done</div></div>
  <div class="stat"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Streak</div></div>
  <div class="stat"><div class="stat-val" id="s-rem">75</div><div class="stat-lbl">Left</div></div>
</div>

<div class="section">
  <div class="day-nav">
    <button onclick="changeDay(-1)" aria-label="Previous">&#8592;</button>
    <span class="day-nav-label" id="day-label">Day 1</span>
    <button onclick="changeDay(1)" aria-label="Next">&#8594;</button>
  </div>
  <div class="phase-box" id="phase-box"></div>

  <div class="section-title" id="gym-title">Gym workout</div>
  <div class="ex-card" id="ex-list"></div>

  <div class="section-title" style="margin-top:16px">Evening run</div>
  <div class="run-card">
    <div class="run-target-row">
      <span style="font-size:12px;color:var(--txt2)">Target</span>
      <span style="font-size:13px;font-weight:600;color:var(--blue-lt)" id="run-target">—</span>
    </div>
    <div class="run-field">
      <span class="run-field-label">Miles run</span>
      <div class="run-field-right">
        <input class="run-input" type="number" id="run-miles" min="0" max="15" step="0.1" placeholder="0.0" oninput="saveRun()">
        <span class="run-unit">mi</span>
      </div>
    </div>
    <div class="run-field">
      <span class="run-field-label">Time</span>
      <div class="run-field-right">
        <input class="run-input" type="number" id="run-time" min="0" max="120" step="1" placeholder="45" oninput="saveRun()">
        <span class="run-unit">min</span>
      </div>
    </div>
    <div class="run-field" id="pace-row" style="display:none">
      <span class="run-field-label">Pace</span>
      <span class="pace-display" id="run-pace">—</span>
    </div>
    <button class="mark-run-btn" id="run-btn" onclick="toggleRun()">Mark run done</button>
  </div>

  <div class="section-title" style="margin-top:16px">75-day calendar</div>
  <div class="day-grid" id="day-grid"></div>

  <div class="section-title" style="margin-top:16px">Weight progress</div>
  <div id="weight-prog"></div>

  <div class="section-title" style="margin-top:16px">Running progress</div>
  <div id="run-prog"></div>
</div>

<script>
const PUSH=[
  {n:'Bench press',s:'3',r:'8',w:1},
  {n:'Overhead press',s:'3',r:'8',w:1},
  {n:'Incline DB press',s:'3',r:'10',w:1},
  {n:'Cable fly',s:'3',r:'12',w:1},
  {n:'Lateral raises',s:'4',r:'15',w:1},
  {n:'Cable lateral raises',s:'2',r:'15',w:1},
  {n:'Tricep pushdowns',s:'3',r:'12',w:1},
  {n:'OH tricep ext.',s:'3',r:'12',w:1},
  {n:'Plank',s:'3',r:'45s',w:0},
  {n:'Dead bug',s:'3',r:'10/side',w:0},
  {n:'Hanging knee raise',s:'3',r:'12',w:0},
];
const PULL=[
  {n:'Barbell row',s:'3',r:'8',w:1},
  {n:'Lat pulldown',s:'3',r:'8',w:1},
  {n:'Seated cable row',s:'3',r:'10',w:1},
  {n:'Face pulls',s:'3',r:'15',w:1},
  {n:'Barbell curl',s:'3',r:'10',w:1},
  {n:'Hammer curl',s:'3',r:'12',w:1},
  {n:'Romanian deadlift',s:'3',r:'10',w:1},
  {n:"Farmer's carry",s:'3',r:'40m',w:0},
  {n:'Scapular push-ups',s:'2',r:'15',w:0},
  {n:'Plank',s:'3',r:'45s',w:0},
  {n:'Dead bug',s:'3',r:'10/side',w:0},
  {n:'Hanging knee raise',s:'3',r:'12',w:0},
];
const PHASES=[
  [1,25,'Phase 1 — Foundation. Light weight, perfect form. Easy jogs ~3–3.5 mi.'],
  [26,50,'Phase 2 — Build. Add weight weekly. Push runs to 4.5–5 mi.'],
  [51,75,'Phase 3 — Strength. Heavy and controlled. Target 5.5–6 mi runs.'],
];
function phase(d){return PHASES.find(p=>d>=p[0]&&d<=p[1]);}
function isPush(d){return d%2===1;}
function runTarget(d){
  if(d<=15)return((3+d*0.033)).toFixed(1)+' mi';
  if(d<=30)return((3.5+(d-15)*0.067)).toFixed(1)+' mi';
  if(d<=50)return((4.5+(d-30)*0.05)).toFixed(1)+' mi';
  return((5.5+(d-50)*0.05)).toFixed(1)+' mi';
}

let cur=1;
function gs(){try{return JSON.parse(localStorage.getItem('ah75')||'{}');}catch(e){return{};}}
function ss(s){try{localStorage.setItem('ah75',JSON.stringify(s));}catch(e){}}
let S=gs();
function wk(d,n){return'w'+(isPush(d)?'p':'l')+'_'+n.replace(/\s/g,'_');}
function dk(d){return'd'+d;}
function rk(d){return'r'+d;}

function allDone(d){
  const exs=isPush(d)?PUSH:PULL;
  const dd=S[dk(d)]||{};
  return exs.every(e=>dd[e.n])&&!!((S[rk(d)]||{}).done);
}

function render(){
  const push=isPush(cur);
  const exs=push?PUSH:PULL;
  document.getElementById('day-label').textContent='Day '+cur;
  const hb=document.getElementById('header-badge');
  hb.textContent=push?'Push':'Pull';
  hb.className='badge '+(push?'badge-push':'badge-pull');
  const ph=phase(cur);
  document.getElementById('phase-box').textContent=ph?ph[2]:'';
  document.getElementById('gym-title').textContent='Gym — '+(push?'push day':'pull day');
  const dd=S[dk(cur)]||{};
  const list=document.getElementById('ex-list');
  list.innerHTML='';
  exs.forEach(ex=>{
    const done=!!dd[ex.n];
    const sw=S[wk(cur,ex.n)]||'';
    const row=document.createElement('div');
    row.className='ex-row';
    row.innerHTML=`<div style="flex:1"><div class="ex-name">${ex.n}</div><div class="ex-meta">${ex.s} sets × ${ex.r}</div></div>${ex.w?`<input class="weight-input" type="number" min="0" step="2.5" value="${sw}" placeholder="lb" data-ex="${ex.n}" oninput="saveW(this)" onclick="this.select()">`:'<span style="width:60px"></span>'}<button class="check-btn ${done?'done':''}" data-ex="${ex.n}" onclick="toggleEx(this)">${done?'&#10003;':''}</button>`;
    list.appendChild(row);
  });
  const rd=S[rk(cur)]||{};
  document.getElementById('run-target').textContent=runTarget(cur);
  document.getElementById('run-miles').value=rd.miles||'';
  document.getElementById('run-time').value=rd.time||'';
  const rb=document.getElementById('run-btn');
  rb.textContent=rd.done?'Run done ✓':'Mark run done';
  rb.className='mark-run-btn'+(rd.done?' done':'');
  updatePace();
  renderGrid();
  renderStats();
  renderWeightProg();
  renderRunProg();
}

function saveW(inp){
  S[wk(cur,inp.dataset.ex)]=inp.value;
  ss(S);renderWeightProg();
}
function toggleEx(btn){
  const d=dk(cur);if(!S[d])S[d]={};
  S[d][btn.dataset.ex]=!S[d][btn.dataset.ex];
  ss(S);render();
}
function saveRun(){
  const d=rk(cur);if(!S[d])S[d]={};
  S[d].miles=document.getElementById('run-miles').value;
  S[d].time=document.getElementById('run-time').value;
  ss(S);updatePace();renderStats();renderRunProg();renderGrid();
}
function toggleRun(){
  const d=rk(cur);if(!S[d])S[d]={};
  S[d].done=!S[d].done;ss(S);render();
}
function updatePace(){
  const m=parseFloat(document.getElementById('run-miles').value);
  const t=parseFloat(document.getElementById('run-time').value);
  const row=document.getElementById('pace-row');
  if(m>0&&t>0){
    const pm=Math.floor(t/m),ps=Math.round((t/m-pm)*60);
    document.getElementById('run-pace').textContent=pm+':'+(ps<10?'0':'')+ps+' /mi';
    row.style.display='flex';
  }else{row.style.display='none';}
}
function renderGrid(){
  const g=document.getElementById('day-grid');g.innerHTML='';
  for(let d=1;d<=75;d++){
    const dot=document.createElement('div');
    dot.className='dot'+(d===cur?' active':'')+(allDone(d)?' '+(isPush(d)?'push-done':'pull-done'):'');
    dot.onclick=(function(day){return function(){cur=day;render();};})(d);
    g.appendChild(dot);
  }
}
function renderStats(){
  let done=0,streak=0,tmp=0;
  for(let d=1;d<=75;d++){
    if(allDone(d)){done++;tmp++;streak=Math.max(streak,tmp);}else tmp=0;
  }
  document.getElementById('s-day').textContent=cur;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-streak').textContent=streak;
  document.getElementById('s-rem').textContent=Math.max(0,75-done);
}
function renderWeightProg(){
  const allEx=[...new Set([...PUSH,...PULL].filter(e=>e.w).map(e=>e.n))];
  const c=document.getElementById('weight-prog');c.innerHTML='';
  allEx.forEach(name=>{
    let first=0,max=0,found=false;
    for(let d=1;d<=75;d++){
      const exs=isPush(d)?PUSH:PULL;
      if(!exs.find(e=>e.n===name))continue;
      const v=parseFloat(S[wk(d,name)]||0);
      if(v>0){if(!found){first=v;found=true;}if(v>max)max=v;}
    }
    if(!found)return;
    const pct=first>0?Math.min(100,Math.round(((max-first)/first)*100)):0;
    const div=document.createElement('div');div.className='prog-item';
    div.innerHTML=`<div class="prog-header"><span class="prog-name">${name}</span><span class="prog-val">${first}→${max} lb &nbsp;+${pct}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;
    c.appendChild(div);
  });
  if(!c.innerHTML)c.innerHTML='<p style="font-size:12px;color:#666">Log weights to see progress.</p>';
}
function renderRunProg(){
  const c=document.getElementById('run-prog');c.innerHTML='';
  let first=0,max=0,total=0,runs=0,found=false;
  for(let d=1;d<=75;d++){
    const rd=S[rk(d)]||{};
    const m=parseFloat(rd.miles||0);
    if(m>0){total+=m;runs++;if(!found){first=m;found=true;}if(m>max)max=m;}
  }
  if(!found){c.innerHTML='<p style="font-size:12px;color:#666">Log runs to see progress.</p>';return;}
  const avg=runs>0?(total/runs).toFixed(1):0;
  const pct=first>0?Math.min(100,Math.round(((max-first)/first)*100)):0;
  const stats=document.createElement('div');stats.className='run-stats';
  stats.innerHTML=`<div class="run-stat"><div class="run-stat-val">${total.toFixed(1)}</div><div class="run-stat-lbl">Total mi</div></div><div class="run-stat"><div class="run-stat-val">${avg}</div><div class="run-stat-lbl">Avg mi</div></div><div class="run-stat"><div class="run-stat-val">${max.toFixed(1)}</div><div class="run-stat-lbl">Best run</div></div>`;
  c.appendChild(stats);
  const bar=document.createElement('div');bar.className='prog-item';
  bar.innerHTML=`<div class="prog-header"><span class="prog-name">Distance</span><span class="prog-val">${first.toFixed(1)}→${max.toFixed(1)} mi &nbsp;+${pct}%</span></div><div class="prog-bar"><div class="prog-fill prog-fill-run" style="width:${pct}%"></div></div>`;
  c.appendChild(bar);
}
function changeDay(d){cur=Math.max(1,Math.min(75,cur+d));render();}
render();
</script>
</body>
</html>
